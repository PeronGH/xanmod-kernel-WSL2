name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'

jobs:
  build-main:
    uses: ./.github/workflows/build-core.yml
    with:
      branch: MAIN

  build-lts:
    uses: ./.github/workflows/build-core.yml
    with:
      branch: LTS
      version_suffix: lts
